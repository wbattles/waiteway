<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>waiteway - settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #000; height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #000; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    main { flex: 1; overflow: hidden; }
    .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.25); display: flex; align-items: center; justify-content: center; z-index: 10; }
    .modal.hidden { display: none; }
    .modal-box { position: relative; background: #fff; padding: 24px; width: 360px; max-width: 90vw; max-height: 80vh; display: flex; flex-direction: column; gap: 12px; border: 1px solid #000; overflow: hidden; }
    .modal-box h2 { font-size: 0.95rem; font-weight: 500; padding-right: 24px; }
    .modal-close { position: absolute; top: 8px; right: 12px; background: none; border: none; font-size: 1rem; line-height: 1; cursor: pointer; padding: 4px 6px; font-family: inherit; color: inherit; }
    .modal-box input, .modal-box textarea { width: 100%; border: 1px solid #000; padding: 8px 10px; font-size: 0.875rem; font-family: inherit; outline: none; }
    .modal-actions { display: flex; gap: 8px; position: relative; }
    .user-selection { display: flex; flex-direction: column; gap: 8px; }
    .user-selection > label { font-size: 0.875rem; margin-bottom: 4px; }
    .user-checkbox-list { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; max-height: 150px; overflow-y: auto; border: 1px solid #000; padding: 8px 10px; }
    .user-checkbox { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; cursor: pointer; justify-content: flex-start; }
    .user-checkbox input[type="checkbox"] { margin: 0; flex-shrink: 0; }
    .hidden { display: none; }
    .header-actions { display: flex; gap: 8px; }
    .header-actions form { margin: 0; display: flex; }
    .admin-main { width: 100%; max-width: 1000px; margin: 0 auto; }
    .admin-tabs { display: flex; border-bottom: 1px solid #000; background: #fff; width: 100%; box-sizing: border-box; }
    .tab-btn { padding: 12px 24px; border: none; border-bottom: 2px solid transparent; background: none; cursor: pointer; font-size: 0.875rem; font-family: inherit; min-width: 80px; text-align: center; }
    .tab-btn.active { border-bottom-color: #000; }
    .tab-content { padding: 24px; position: relative; width: 100%; box-sizing: border-box; }
    .tab-panel { display: none; width: 100%; }
    .tab-panel.active { display: block; }
    .tab-panel h3 { font-size: 1rem; font-weight: 500; margin-bottom: 12px; }
    .settings-left { display: flex; flex-direction: column; gap: 24px; width: 300px; height: 500px; }
    .settings-panel { padding: 20px; border: 1px solid #000; height: fit-content; display: flex; flex-direction: column; gap: 12px; overflow: hidden; box-sizing: border-box; }
    .settings-panel h3 { margin-bottom: 4px; }
    .settings-panel form { display: flex; flex-direction: column; gap: 12px; }
    .settings-panel input[type="password"] { border: 1px solid #000; padding: 8px 10px; font-size: 0.875rem; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
    .settings-panel label { font-size: 0.875rem; }
    .settings-row { display: flex; align-items: center; gap: 8px; }
    .settings-row label { flex-shrink: 0; width: 40px; }
    .settings-row select { flex: 1; min-width: 0; }
    .settings-panel select { width: 100%; box-sizing: border-box; }
    .settings-panel button { margin-top: 4px; }
    .api-key-value { font-size: 0.8rem; font-family: monospace; }
    .api-keys-panel.user-list-panel { height: auto; min-height: 0; flex: 1; }
    .api-keys-panel h3 { border-bottom: none; padding-bottom: 0; margin-bottom: 8px; }
    .api-keys-footer { padding: 8px 20px 12px 20px; flex-shrink: 0; }
    .users-layout, .teams-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; height: 100%; }
    .create-user-panel, .create-team-panel { padding: 20px; border: 1px solid #000; height: fit-content; }
    .create-user-panel h3, .create-team-panel h3 { margin-bottom: 16px; }
    .create-user-panel form, .create-team-panel form { display: flex; flex-direction: column; gap: 12px; }
    .create-user-panel input[type="text"], .create-user-panel input[type="password"], .create-team-panel input[type="text"] { border: 1px solid #000; padding: 8px 10px; font-size: 0.875rem; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
    .create-user-panel label, .create-team-panel label { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; }
    .create-user-panel button, .create-team-panel button { margin-top: 4px; }
    .user-list-panel { border: 1px solid #000; display: flex; flex-direction: column; height: 500px; }
    .user-list-panel h3 { padding: 16px 20px 0 20px; margin-bottom: 16px; border-bottom: 1px solid #000; padding-bottom: 12px; flex-shrink: 0; }
    #my-teams-list, #api-keys-container { padding: 0 20px 20px 20px; flex: 1; overflow-y: auto; min-height: 0; }
    .user-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #000; gap: 16px; }
    .user-item:last-child { border-bottom: none; }
    .user-item:first-child { padding-top: 0; }
    .user-main { flex: 1; min-width: 0; }
    .user-identity { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; flex-wrap: wrap; }
    .username { font-weight: 500; font-size: 0.875rem; word-break: break-word; min-width: 0; }
    .user-activity { font-size: 0.75rem; color: #666; }
    .admin-badge { font-size: 0.7rem; padding: 1px 5px; border: 1px solid #000; }
    .user-actions { display: flex; align-items: flex-start; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    body.dark { background: #000; color: #fff; }
    body.dark header { border-bottom-color: #fff; }
    body.dark .modal-box { background: #000; border-color: #fff; }
    body.dark .modal-box input, body.dark .modal-box textarea { border-color: #fff; background: #000; color: #fff; }
    body.dark .admin-tabs { border-bottom-color: #fff; background: #000; }
    body.dark .tab-btn.active { border-bottom-color: #fff; }
    body.dark .create-user-panel, body.dark .create-team-panel, body.dark .settings-panel, body.dark .user-list-panel { border-color: #fff; }
    body.dark .user-item { border-bottom-color: #fff; }
    body.dark .user-list-panel h3 { border-bottom-color: #fff; }
    body.dark .admin-badge { border-color: #fff; }
    body.dark .user-checkbox-list { border-color: #fff; }
    body.dark .settings-panel input[type="password"], body.dark .create-user-panel input[type="password"], body.dark .create-user-panel input[type="text"] { border-color: #fff; background: #000; color: #fff; }
    body.dark .user-activity { color: #999; }
    body.dark .tab-btn { color: #fff; }
    body.dark .settings-panel label, body.dark .create-user-panel label { color: #fff; }
    body.dark .settings-panel select, body.dark .create-user-panel select { background: #000; color: #fff; }
    body.dark .modal-box h2, body.dark #confirm-message { color: #fff; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <span class="app-name">waiteway settings</span>
    </div>
    <div class="header-actions">
      <button onclick="window.location.href='/'">back to board</button>
      {{ if .IsAdmin }}<button onclick="window.location.href='/admin'">admin</button>{{ end }}
      <form method="post" action="/logout"><button type="submit">logout</button></form>
    </div>
  </header>

  <main class="admin-main">
    <nav class="admin-tabs">
      <button class="tab-btn active" onclick="showTab('settings', this)">settings</button>
    </nav>

    <div class="tab-content">
      <section id="settings-tab" class="tab-panel active">
        <div class="users-layout">
          <div class="settings-left">
            <div class="create-user-panel">
              <h3>change password</h3>
              <form id="password-form">
                <input type="password" id="pw-current" placeholder="current password" required />
                <input type="password" id="pw-new" placeholder="new password" required />
                <button type="submit">save password</button>
              </form>
            </div>

            <div class="create-user-panel">
              <h3>display</h3>
              <div class="settings-row">
                <label>font</label>
                <select id="font-select" onchange="changeFont()">
                  <option value="system-ui, -apple-system, sans-serif">system (default)</option>
                  <option value="Georgia, serif">georgia</option>
                  <option value="Courier New, monospace">courier new</option>
                  <option value="Papyrus, fantasy">papyrus</option>
                  <option value="Comic Sans MS, Comic Sans, cursive">comic sans</option>
                  <option value="Zapfino, cursive">zapfino</option>
                </select>
              </div>
              <div class="settings-row">
                <label>mode</label>
                <select id="mode-select" onchange="changeMode()">
                  <option value="light">light</option>
                  <option value="dark">dark</option>
                </select>
              </div>
            </div>
          </div>

          <div class="user-list-panel api-keys-panel">
            <h3>api keys</h3>
            <div id="api-keys-container"></div>
            <div class="api-keys-footer">
              <button onclick="generateApiKey()">generate new key</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="key-modal" class="modal hidden">
    <div class="modal-box">
      <button type="button" class="modal-close" aria-label="close" onclick="closeKeyModal()">✕</button>
      <h2>new api key</h2>
      <p>copy this key — it will not be shown again:</p>
      <input type="text" id="key-modal-value" readonly onclick="this.select()" />
      <div class="modal-actions">
        <button onclick="copyKey()">copy</button>
        <button onclick="closeKeyModal()">close</button>
      </div>
    </div>
  </div>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-box">
      <button type="button" class="modal-close" aria-label="close" onclick="closeConfirmModal()">✕</button>
      <h2 id="confirm-title">confirm action</h2>
      <p id="confirm-message">are you sure?</p>
      <div class="modal-actions">
        <button id="confirm-ok" onclick="confirmAction()">confirm</button>
        <button id="confirm-cancel" onclick="closeConfirmModal()">cancel</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = { id: {{ .CurrentUser.ID }}, username: {{ printf "%q" .CurrentUser.Username }}, is_admin: {{ if .IsAdmin }}true{{ else }}false{{ end }} };
    let confirmCallback = null;

    function showConfirmModal(title, message, callback) {
      const titleElement = document.getElementById('confirm-title');
      if (title) {
        titleElement.textContent = title;
        titleElement.style.display = 'block';
      } else {
        titleElement.style.display = 'none';
      }
      document.getElementById('confirm-message').textContent = message;
      confirmCallback = callback;
      const isNotification = !callback;
      document.getElementById('confirm-ok').style.display = isNotification ? 'none' : '';
      document.getElementById('confirm-cancel').style.display = isNotification ? 'none' : '';
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    function closeConfirmModal() {
      document.getElementById('confirm-modal').classList.add('hidden');
      confirmCallback = null;
    }

    function confirmAction() {
      if (confirmCallback) confirmCallback();
      closeConfirmModal();
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('confirm-modal').addEventListener('click', e => {
        if (e.target === document.getElementById('confirm-modal')) closeConfirmModal();
      });
    });

    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function showTab(tabName, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`${tabName}-tab`).classList.add('active');
      btn.classList.add('active');
    }

    document.getElementById('password-form').addEventListener('submit', async e => {
      e.preventDefault();
      const current_password = document.getElementById('pw-current').value;
      const new_password = document.getElementById('pw-new').value;
      if (!current_password || !new_password) return;
      showConfirmModal('', 'change password?', async () => {
        try {
          const response = await fetch('/api/me/password', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current_password, new_password }),
          });
          if (response.ok) {
            document.getElementById('password-form').reset();
            showConfirmModal('', 'password updated', null);
          } else {
            const error = await response.json();
            showConfirmModal('', error.detail || 'failed to change password', null);
          }
        } catch (error) {
          showConfirmModal('', 'failed to change password', null);
        }
      });
    });

    async function loadApiKeys() {
      try {
        const response = await fetch('/api/me/api-keys');
        if (!response.ok) return;
        const keys = await response.json();
        const container = document.getElementById('api-keys-container');
        if (keys.length === 0) {
          container.innerHTML = '<div class="user-activity">no api keys</div>';
          return;
        }
        container.innerHTML = keys.map(k => `
          <div class="user-item">
            <div class="user-main">
              <div class="api-key-value">${k.key}</div>
            </div>
            <div class="user-actions">
              <button onclick="deleteApiKey(${k.id})">delete</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading api keys:', error);
      }
    }

    async function generateApiKey() {
      const response = await fetch('/api/me/api-keys', { method: 'POST' });
      if (response.ok) {
        const data = await response.json();
        document.getElementById('key-modal-value').value = data.key;
        document.getElementById('key-modal').classList.remove('hidden');
        loadApiKeys();
      }
    }

    function copyKey() {
      const input = document.getElementById('key-modal-value');
      input.select();
      navigator.clipboard.writeText(input.value);
    }

    function closeKeyModal() {
      document.getElementById('key-modal').classList.add('hidden');
    }

    document.getElementById('key-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('key-modal')) closeKeyModal();
    });

    async function deleteApiKey(id) {
      const response = await fetch(`/api/me/api-keys/${id}`, { method: 'DELETE' });
      if (response.ok) loadApiKeys();
    }

    function changeFont() {
      const font = document.getElementById('font-select').value;
      document.body.style.fontFamily = font;
      localStorage.setItem('waiteway-font', font);
    }

    function loadFont() {
      const saved = localStorage.getItem('waiteway-font');
      if (saved) {
        document.body.style.fontFamily = saved;
        document.getElementById('font-select').value = saved;
      }
    }

    function changeMode() {
      const mode = document.getElementById('mode-select').value;
      applyMode(mode);
      localStorage.setItem('waiteway-mode', mode);
    }

    function applyMode(mode) {
      if (mode === 'dark') document.body.classList.add('dark');
      else document.body.classList.remove('dark');
    }

    function loadMode() {
      const saved = localStorage.getItem('waiteway-mode') || 'light';
      applyMode(saved);
      document.getElementById('mode-select').value = saved;
    }

    loadFont();
    loadMode();
    loadApiKeys();
  </script>
</body>
</html>
